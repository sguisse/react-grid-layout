name: release

on:
  workflow_dispatch:
    inputs:
      semver:
        description: "The semver to use"
        required: true
        default: "patch"
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      tag:
        description: "The npm tag"
        required: false
        default: "latest"
  # We deactivate automatic triggering on PR closed
  # to avoid posting by mistake. We keep the manual for testing.

jobs:
  release:
    # We make sure that this ONLY runs on your release branch
    if: github.ref == 'refs/heads/release-sguisse'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write # Required for NPM provenance (security)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important so that the tool can calculate the changelog

      - name: Set up Node.js
        uses: actions/setup-node@v4 # Update to v4 (more stable)
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install & Build
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Optic Release Automation
        uses: nearform-actions/optic-release-automation-action@v4
        with:
          semver: ${{ github.event.inputs.semver || 'patch' }}
          npm-tag: ${{ github.event.inputs.tag || 'latest' }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          provenance: true
          # We ensure that the action does not re-build unnecessarily
          build-command: "echo 'Already built'"
